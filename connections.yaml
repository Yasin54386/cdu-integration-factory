# Connection metadata + secret NAMES only (spec §7, D9).
# Secret VALUES live in GitHub Actions Secrets (repo Settings → Secrets →
# Actions) and are injected as env vars by the workflow. NEVER put a
# credential value in this file.

oracle_dev:
  type: oracle
  host: oradev.cdu.internal
  port: 1521
  service: CDUDEV
  schema: INTEGRATION
  auth: basic
  secrets: { user: ORACLE_DEV_USER, password: ORACLE_DEV_PASSWORD }

# MuleSoft target: git handoff to CDU's GitLab (gitlab.com).
# The factory pushes the generated Mule app to this group; the institute's
# existing CI/CD deploys it to Anypoint from there (spec §17 amendment).
mule_repo_dev:
  type: git_repo
  provider: gitlab
  host: gitlab.com
  namespace: charles-darwin-university/itms/mulesoft
  secrets: { token: MULE_REPO_TOKEN }

# Alternative: direct Anypoint deployment (original spec §10 path; needs M5).
mule_dev:
  type: anypoint
  org_id: cdu-integration
  environment: DEV
  auth: connected_app
  secrets: { client_id: MULE_DEV_CLIENT_ID, client_secret: MULE_DEV_CLIENT_SECRET }

# Factory repo host: CDU GitHub Enterprise Server.
# Used by gitops.py for commit-backs ([skip ci] commits) and branch pushes.
# Token: GHE_TOKEN — a PAT from charles-darwin-university.ghe.com/settings/tokens
#   with Contents: Read & Write on the factory repository.
git_main:
  type: github
  host: charles-darwin-university.ghe.com
  secrets: { token: GHE_TOKEN }

# AI generation uses the public github.com Models API (models.inference.ai.azure.com).
# This is SEPARATE from GHE — it needs a personal github.com PAT with Models: Read.
# Token: GH_PIPELINE_TOKEN — from https://github.com/settings/tokens
# (not your GHE account — a public github.com personal account)
# Set in env: $env:GH_PIPELINE_TOKEN = "github_pat_..."
# See pipeline/core/models_api.py for token resolution order.

sftp_dev:
  type: sftp
  host: sftpdev.cdu.internal
  port: 22
  secrets: { user: SFTP_DEV_USER, key: SFTP_DEV_PRIVATE_KEY }
