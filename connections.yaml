# Connection metadata + secret NAMES only (spec §7, D9).
# Secret VALUES live in GitHub Actions Secrets (repo Settings → Secrets →
# Actions) and are injected as env vars by the workflow. NEVER put a
# credential value in this file.

oracle_dev:
  type: oracle
  host: oradev.cdu.internal
  port: 1521
  service: CDUDEV
  schema: INTEGRATION
  auth: basic
  secrets: { user: ORACLE_DEV_USER, password: ORACLE_DEV_PASSWORD }

# Default MuleSoft target: git handoff (spec §17 amendment). The factory
# pushes the generated Mule app to this repo host; the institute's existing
# CI/CD deploys it to Anypoint from there.
mule_repo_dev:
  type: git_repo
  provider: github            # github | gitlab
  host: github.com            # e.g. gitlab.cdu.internal for self-hosted GitLab
  namespace: cdu-integration  # org (GitHub) or group (GitLab) that owns Mule app repos
  secrets: { token: MULE_REPO_TOKEN }

# Alternative: direct Anypoint deployment (original spec §10 path; needs M5).
mule_dev:
  type: anypoint
  org_id: cdu-integration
  environment: DEV
  auth: connected_app
  secrets: { client_id: MULE_DEV_CLIENT_ID, client_secret: MULE_DEV_CLIENT_SECRET }

git_main:
  type: github                        # or gitlab — gitops.py branches on this
  secrets: { token: GH_PIPELINE_TOKEN }

sftp_dev:
  type: sftp
  host: sftpdev.cdu.internal
  port: 22
  secrets: { user: SFTP_DEV_USER, key: SFTP_DEV_PRIVATE_KEY }
